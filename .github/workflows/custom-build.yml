name: Build Files App (.NET 9)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 1. تثبيت .NET 9 SDK بشكل صريح
    - name: Setup .NET 9
      uses: actions/setup-dotnet@v2
      with:
        dotnet-version: '9.0.x'
        # نستخدم 9.0.x لضمان الحصول على أحدث التحديثات الأمنية من الإصدار التاسع

    # 2. إعداد MSBuild (النسخة المستقرة كافية لـ .NET 9)
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 3. التحقق من الإصدارات المثبتة للتأكد من التوافق
    - name: Verify Tool Versions
      run: |
        dotnet --version
        msbuild /version

    # 4. الـ Restore باستخدام MSBuild
    - name: Restore Packages
      run: |
        msbuild Files.slnx -t:restore -p:RestorePackagesConfig=true

    # 5. البناء النهائي للسلوشن
    - name: Build Solution
      run: |
        msbuild Files.slnx /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false /p:BuildInParallel=false /m:1 /p:UapAppxPackageBuildMode="Sideload Only"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Build-NET9
        path: src/Files/AppPackages/
        if-no-files-found: error
