name: Build Custom Files App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # تثبيت دوت نت (ضروري لدعم .slnx)
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # أو النسخة التي يستخدمها مشروع Files حالياً

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # استخدام dotnet restore بدلاً من nuget restore
    - name: Restore Packages
    # لاحظ المسار الجديد src/Files.slnx
      run: dotnet restore src/Files.slnx

    - name: Build Solution
      run: |
        msbuild src/Files.slnx /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Custom-Build
        path: src/Files/AppPackages/
