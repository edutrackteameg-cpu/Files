name: Build Files App (Ultimate Preview)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 1. تثبيت .NET 10 التجريبي (نحتاجه للـ SDKs فقط)
    - name: Setup .NET 10 Preview
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
        include-prerelease: true

    # 2. إعداد MSBuild نسخة الـ Preview (هذا هو المفتاح لحل خطأ C++)
    - name: Setup MSBuild Preview
      uses: microsoft/setup-msbuild@v2
      with:
        # إجبار الأكشن على البحث عن نسخ Visual Studio التجريبية (Preview)
        vs-prerelease: true 

    # 3. استخدام MSBuild للـ Restore بدلاً من dotnet
    # الـ Restore من خلال MSBuild هو الوحيد القادر على فهم مشاريع .vcxproj بشكل كامل
    - name: Restore Packages
      run: |
        msbuild Files.slnx -t:restore -p:RestorePackagesConfig=true

    # 4. البناء النهائي باستخدام MSBuild الكامل
    - name: Build Solution
      run: |
        msbuild Files.slnx /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false /p:BuildInParallel=false /m:1 /verbosity:minimal /p:UapAppxPackageBuildMode="Sideload Only"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Preview-Build
        path: src/Files/AppPackages/
        if-no-files-found: error
