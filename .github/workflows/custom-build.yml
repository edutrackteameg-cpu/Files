name: Build Files App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # 1. إجبار البيئة على استخدام إصدار مستقر ومتوافق مع MSBuild 17
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' 
        # هذا يمنع استخدام نسخ Preview مثل 10.0
        dotnet-quality: 'ga'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 2. استخدام MSBuild للـ Restore بدلاً من dotnet restore
    # هذا ضروري لأن السلوشن يحتوي على مشاريع C++ (vcxproj)
    - name: Restore Packages
      run: |
        msbuild Files.slnx -t:restore -p:RestorePackagesConfig=true

    # 3. البناء النهائي
    - name: Build Solution
      run: |
        msbuild Files.slnx /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false /p:BuildInParallel=false /m:1 /verbosity:minimal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Custom-Build
        path: src/Files/AppPackages/
        if-no-files-found: error
