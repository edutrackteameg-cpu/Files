name: Build Custom Files App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3

    - name: Setup NuGet
      uses: NuGet/setup-nuget@v1

    # التعديل هنا: المسار الصحيح هو src/Files.sln
    - name: Restore Packages
      run: nuget restore src/Files.sln

    # التعديل هنا: توجيه الـ Build للمجلد الصحيح وتحديد المشروع الأساسي
    - name: Build Solution
      run: |
        msbuild src/Files.sln /p:Configuration=Release /p:Platform=x64 /p:UapAppxPackageBuildMode=SideloadOnly /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Custom-Build
        # التأكد من مسار المخرجات الصحيح (قد يتغير حسب بنية المشروع)
        path: src/Files/AppPackages/
