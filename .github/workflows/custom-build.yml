name: Build Files App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    # الخطوة السحرية: إجبار المشروع على استخدام .NET 8 ومنع "Roll Forward" للإصدارات الأحدث
    - name: Create global.json
      run: |
        echo '{"sdk": {"version": "8.0.403", "rollForward": "latestPatch"}}' > global.json

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        dotnet-quality: 'ga'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # نستخدم MSBuild للـ Restore لأنه الأفضل مع المشاريع المختلطة (C++ و C#)
    - name: Restore Packages
      run: |
        msbuild Files.slnx -t:restore -p:RestorePackagesConfig=true

    - name: Build Solution
      run: |
        # أضفنا متغير لتعطيل استخدام الـ SDKs التجريبية أثناء البناء
        msbuild Files.slnx /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false /p:BuildInParallel=false /m:1 /verbosity:minimal /p:NETCoreSdkRuntimeIdentifier=win-x64

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Custom-Build
        path: src/Files/AppPackages/
        if-no-files-found: error
