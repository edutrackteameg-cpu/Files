name: Build Files App Only

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive' # ضروري جداً لجلب مكتبات المشروع

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # الإصدار المستقر المطلوب
        dotnet-quality: 'ga'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore Packages
      # المسار في الجذر مباشرة
      run: dotnet restore Files.slnx

    - name: Build Solution
      run: |
        # بناء النسخة النهائية x64 مع تعطيل التوقيع وتحديد ملف السلوشن في الجذر
        msbuild Files.slnx /p:Configuration=Release /p:Platform=x64 /p:AppxBundle=Always /p:AppxPackageSigningEnabled=false /p:BuildInParallel=false /m:1 /verbosity:minimal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Files-Custom-Build
        # مسار الملفات الناتجة بعد البناء
        path: src/Files/AppPackages/
        if-no-files-found: error
